<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Scheduler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1c1e21;
      min-height: 100vh;
    }

    header {
      background: #075e54;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }

    header h1 { font-size: 1.3rem; font-weight: 600; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .875rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }
    .dot.green  { background: #4caf50; }
    .dot.yellow { background: #ff9800; }
    .dot.red    { background: #f44336; }

    main {
      max-width: 680px;
      margin: 24px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #075e54;
    }

    /* QR card */
    #qr-card { text-align: center; }
    #qr-img {
      max-width: 240px;
      margin: 16px auto;
      display: block;
      border: 4px solid #f0f2f5;
      border-radius: 8px;
    }
    #qr-card p { color: #666; font-size: .9rem; line-height: 1.6; }

    /* Connecting card */
    #connecting-card { text-align: center; padding: 40px 24px; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f2f5;
      border-top-color: #075e54;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #connecting-card p { color: #666; }

    /* Shutdown banner */
    #shutdown-banner {
      background: #fff3e0;
      border: 1px solid #ff9800;
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    #shutdown-banner .banner-text { font-size: .9rem; color: #e65100; }
    #shutdown-banner strong { display: block; font-size: 1rem; margin-bottom: 2px; }

    /* Form */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #444;
    }

    input[type="text"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      transition: border-color .2s;
      outline: none;
      background: white;
    }
    input:focus, textarea:focus { border-color: #075e54; }
    textarea { resize: vertical; min-height: 80px; }

    /* Contact autocomplete */
    .contact-wrapper { position: relative; }
    #contact-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }
    .contact-item {
      padding: 10px 12px;
      cursor: pointer;
      font-size: .9rem;
    }
    .contact-item:hover { background: #f0f2f5; }
    .contact-name { font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .contact-number { font-size: .8rem; color: #888; }
    .group-tag {
      font-size: .7rem;
      font-weight: 600;
      background: #e3f2fd;
      color: #1565c0;
      padding: 1px 6px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity .2s, transform .1s;
    }
    .btn:active  { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary {
      background: #075e54;
      color: white;
      width: 100%;
      padding: 12px;
    }
    .btn-primary:hover:not(:disabled) { background: #054d45; }

    .btn-secondary {
      background: white;
      color: #075e54;
      border: 1px solid #075e54;
    }
    .btn-secondary:hover { background: #f0f7f6; }

    .btn-sm { padding: 6px 14px; font-size: .85rem; }

    /* Scheduled list */
    #msg-list { display: flex; flex-direction: column; gap: 12px; }

    .msg-item {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .msg-info { flex: 1; min-width: 0; }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .msg-name { font-weight: 600; font-size: .95rem; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-pending { background: #fff3e0; color: #e65100; }
    .badge-sent    { background: #e8f5e9; color: #2e7d32; }
    .badge-failed  { background: #fce4ec; color: #c62828; }
    .badge-missed  { background: #eeeeee; color: #757575; }

    .msg-text {
      font-size: .875rem;
      color: #555;
      margin-bottom: 6px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-meta { font-size: .8rem; color: #888; }
    .msg-actions { flex-shrink: 0; }

    .btn-cancel {
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #bbb;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .btn-cancel:hover { color: #f44336; background: #fce4ec; }

    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 32px;
      font-size: .9rem;
    }

    .hidden { display: none !important; }

    /* Tabs */
    .tabs {
      max-width: 680px;
      margin: 16px auto -8px;
      padding: 0 16px;
      display: flex;
      gap: 8px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e4e6e9;
      color: #555;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .tab.active { background: #075e54; color: white; }

    /* Translate view */
    .group-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid transparent;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .group-chip.active { background: #075e54; color: white; }
    .group-chip .chip-remove { color: inherit; opacity: .6; font-size: 1rem; line-height: 1; }
    .group-chip .chip-remove:hover { opacity: 1; }
    #group-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    #feed {
      height: 60vh;
      overflow-y: auto;
      background: #efe7dd;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .bubble {
      background: white;
      border-radius: 8px;
      padding: 8px 12px;
      max-width: 85%;
      align-self: flex-start;
      box-shadow: 0 1px 1px rgba(0,0,0,.08);
    }
    .bubble.from-me { background: #d9fdd3; align-self: flex-end; }
    .bubble-sender { font-size: .78rem; font-weight: 700; color: #075e54; margin-bottom: 2px; }
    .bubble-translation { font-size: .92rem; color: #1c1e21; white-space: pre-wrap; word-break: break-word; }
    .bubble-original { font-size: .8rem; color: #999; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
    .bubble-meta { font-size: .7rem; color: #aaa; margin-top: 4px; text-align: right; }
    .lang-badge {
      font-size: .65rem;
      font-weight: 700;
      background: #eee;
      color: #777;
      padding: 1px 5px;
      border-radius: 6px;
      margin-left: 6px;
      text-transform: uppercase;
    }
    .bubble-media { font-size: .85rem; color: #888; font-style: italic; }
    .bubble-failed { font-size: .8rem; color: #c62828; }
    #feed-loading { text-align: center; color: #888; font-size: .8rem; padding: 6px; }
    #translate-error {
      background: #fce4ec; color: #c62828; border-radius: 8px;
      padding: 10px 14px; font-size: .85rem; margin-bottom: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>WhatsApp Scheduler</h1>
  <div class="status-badge">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</header>

<nav class="tabs hidden" id="tab-bar">
  <button class="tab active" data-tab="scheduler">Scheduler</button>
  <button class="tab" data-tab="translate">Translate</button>
</nav>

<main>

  <!-- QR Card -->
  <div class="card hidden" id="qr-card">
    <h2>Scan QR Code</h2>
    <img id="qr-img" src="" alt="QR Code">
    <p>Open WhatsApp on your phone &rarr; Settings &rarr; Linked Devices &rarr; Link a Device</p>
  </div>

  <!-- Connecting Card -->
  <div class="card" id="connecting-card">
    <div class="spinner"></div>
    <p id="connecting-text">Connecting to WhatsApp…</p>
  </div>

  <!-- Shutdown Banner -->
  <div id="shutdown-banner" class="hidden">
    <div class="banner-text">
      <strong>Server shutting down</strong>
      <span id="shutdown-countdown"></span>
    </div>
    <button class="btn btn-secondary btn-sm" id="keep-running-btn">Keep Running</button>
  </div>

  <!-- Compose Card -->
  <div class="card hidden" id="compose-card">
    <h2>Schedule a Message</h2>

    <div class="form-group">
      <label for="contact-input">Contact</label>
      <div class="contact-wrapper">
        <input type="text" id="contact-input" placeholder="Click to browse or type to search…" autocomplete="off">
        <div id="contact-dropdown"></div>
      </div>
      <input type="hidden" id="contact-id">
      <input type="hidden" id="contact-name-hidden">
    </div>

    <div class="form-group">
      <label for="message-input">Message <span id="msg-optional" style="font-weight:400;color:#888;font-size:.85rem;display:none;">(optional if file attached)</span></label>
      <textarea id="message-input" placeholder="Type your message…"></textarea>
    </div>

    <div class="form-group">
      <label>Attachment <span style="font-weight:400;color:#888;font-size:.85rem;">(optional)</span></label>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <input type="file" id="file-input" style="display:none">
        <button type="button" class="btn btn-secondary btn-sm" id="attach-btn">📎 Attach File</button>
        <span id="file-name" style="font-size:.875rem;color:#555;"></span>
        <button type="button" id="clear-file-btn" style="display:none;background:none;border:none;color:#bbb;font-size:1.1rem;cursor:pointer;padding:0 4px;" title="Remove attachment">&times;</button>
      </div>
    </div>

    <div class="form-group">
      <label for="send-at">Send At</label>
      <input type="datetime-local" id="send-at">
    </div>

    <button class="btn btn-primary" id="schedule-btn">Schedule Message</button>
  </div>

  <!-- Scheduled Messages Card -->
  <div class="card hidden" id="list-card">
    <h2>Scheduled Messages</h2>
    <div id="msg-list"></div>
  </div>

  <!-- Download Images Card -->
  <div class="card hidden" id="download-card">
    <h2>Download Images &amp; Documents</h2>

    <div class="form-group">
      <label for="download-contact-input">Contact or Group</label>
      <div class="contact-wrapper">
        <input type="text" id="download-contact-input" placeholder="Click to browse or type to search…" autocomplete="off">
        <div id="download-contact-dropdown"></div>
      </div>
      <input type="hidden" id="download-contact-id">
      <input type="hidden" id="download-contact-name-hidden">
    </div>

    <button class="btn btn-primary" id="download-btn">Download Images</button>
    <div id="download-result" style="margin-top:12px;font-size:.875rem;color:#555;"></div>
  </div>

  <!-- Translate: group picker -->
  <div class="card hidden" id="translate-groups-card">
    <h2>Translate Groups</h2>
    <div class="form-group">
      <label for="group-search-input">Add a group</label>
      <div class="contact-wrapper">
        <input type="text" id="group-search-input" placeholder="Click to browse or type to search groups…" autocomplete="off">
        <div id="group-search-dropdown" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;max-height:220px;overflow-y:auto;display:none;"></div>
      </div>
    </div>
    <div id="group-chips"></div>
  </div>

  <!-- Translate: feed -->
  <div class="card hidden" id="translate-feed-card">
    <h2 id="feed-title">Messages</h2>
    <div id="translate-error" class="hidden"></div>
    <div id="feed">
      <div id="feed-loading" class="hidden">Loading older messages…</div>
    </div>
  </div>

</main>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let waStatus = 'initializing';
  let scheduledMessages = [];
  let shutdownAt = null;
  let searchTimeout = null;
  let selectedContact = null;
  let shutdownCountdownInterval = null;
  let activeTab = 'scheduler';
  let translateGroups = [];        // saved [{id, name}]
  let activeGroup = null;          // currently viewed {id, name}
  let feedLimit = 50;
  let feedPollInterval = null;
  let feedMessages = [];
  let feedFetchInFlight = false;

  // ── Utilities ─────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatCountdown(ms) {
    if (ms <= 0) return 'now';
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (d > 0) return `in ${d}d ${h % 24}h`;
    if (h > 0) return `in ${h}h ${m % 60}m`;
    if (m > 0) return `in ${m}m ${s % 60}s`;
    return `in ${s}s`;
  }

  function formatDateTime(ts) {
    return new Date(ts).toLocaleString([], {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  }

  // ── Polling ───────────────────────────────────────────────────────────────
  async function pollStatus() {
    try {
      const [statusRes, scheduledRes] = await Promise.all([
        fetch('/api/status'),
        fetch('/api/scheduled'),
      ]);
      const status = await statusRes.json();
      scheduledMessages = await scheduledRes.json();
      updateStatus(status);
      renderScheduled();
    } catch (_) {
      // server may be shutting down
    }
  }

  function updateStatus(status) {
    waStatus = status.wa;
    shutdownAt = status.shutdownAt;

    const dot           = document.getElementById('status-dot');
    const text          = document.getElementById('status-text');
    const qrCard        = document.getElementById('qr-card');
    const connectingCard = document.getElementById('connecting-card');
    const composeCard   = document.getElementById('compose-card');
    const shutdownBanner = document.getElementById('shutdown-banner');
    const connectingText = document.getElementById('connecting-text');

    // Status badge
    dot.className = 'dot';
    if (waStatus === 'connected') {
      dot.classList.add('green');
      text.textContent = 'Connected';
    } else if (waStatus === 'qr' || waStatus === 'loading') {
      dot.classList.add('yellow');
      text.textContent = waStatus === 'qr' ? 'Scan QR' : 'Connecting…';
    } else {
      dot.classList.add('red');
      text.textContent = 'Disconnected';
    }

    // Card visibility
    qrCard.classList.toggle('hidden', waStatus !== 'qr');
    connectingCard.classList.toggle('hidden', waStatus !== 'initializing' && waStatus !== 'loading');
    applyTabVisibility();

    if (waStatus === 'loading') connectingText.textContent = 'Loading WhatsApp…';
    else if (waStatus === 'initializing') connectingText.textContent = 'Initializing…';

    if (waStatus === 'qr' && status.qr) {
      document.getElementById('qr-img').src = status.qr;
    }

    // Shutdown banner
    if (shutdownAt) {
      shutdownBanner.classList.remove('hidden');
      updateShutdownCountdown();
      if (!shutdownCountdownInterval) {
        shutdownCountdownInterval = setInterval(updateShutdownCountdown, 1000);
      }
    } else {
      shutdownBanner.classList.add('hidden');
      if (shutdownCountdownInterval) {
        clearInterval(shutdownCountdownInterval);
        shutdownCountdownInterval = null;
      }
    }
  }

  function updateShutdownCountdown() {
    if (!shutdownAt) return;
    const remaining = shutdownAt - Date.now();
    const el = document.getElementById('shutdown-countdown');
    if (remaining <= 0) {
      el.textContent = 'Shutting down…';
      return;
    }
    const s = Math.ceil(remaining / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    el.textContent = m > 0
      ? `Shutting down in ${m}m ${sec}s`
      : `Shutting down in ${sec}s`;
  }

  // ── Render scheduled messages ─────────────────────────────────────────────
  function renderScheduled() {
    const list = document.getElementById('msg-list');
    const listCard = document.getElementById('list-card');

    if (waStatus !== 'connected' || activeTab !== 'scheduler' || scheduledMessages.length === 0) {
      listCard.classList.add('hidden');
      return;
    }
    listCard.classList.remove('hidden');

    list.innerHTML = scheduledMessages.map((msg) => {
      const isPending  = msg.status === 'pending';
      const countdown  = isPending ? formatCountdown(msg.sendAt - Date.now()) : '';
      const badgeClass = `badge-${msg.status}`;

      return `
        <div class="msg-item" data-id="${escapeHtml(msg.id)}">
          <div class="msg-info">
            <div class="msg-header">
              <span class="msg-name">${escapeHtml(msg.contactName)}</span>
              <span class="badge ${badgeClass}">${escapeHtml(msg.status)}</span>
            </div>
            <div class="msg-text">${escapeHtml(msg.message)}</div>
            <div class="msg-meta">
              ${isPending
                ? `${escapeHtml(formatDateTime(msg.sendAt))} (${escapeHtml(countdown)})`
                : escapeHtml(formatDateTime(msg.sendAt))}
            </div>
          </div>
          ${isPending ? `
            <div class="msg-actions">
              <button class="btn-cancel" data-cancel="${escapeHtml(msg.id)}" title="Cancel">&times;</button>
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
  }

  // Event delegation — cancel buttons
  document.getElementById('msg-list').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-cancel]');
    if (btn) cancelMessage(btn.dataset.cancel);
  });

  async function cancelMessage(id) {
    try {
      await fetch(`/api/schedule/${encodeURIComponent(id)}`, { method: 'DELETE' });
      await pollStatus();
    } catch (_) {
      alert('Failed to cancel message');
    }
  }

  // ── Contact search ────────────────────────────────────────────────────────
  const contactInput = document.getElementById('contact-input');
  const dropdown     = document.getElementById('contact-dropdown');

  // Show all contacts on focus (browse mode)
  contactInput.addEventListener('focus', () => {
    if (!contactInput.value.trim()) searchContacts('');
  });

  contactInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = contactInput.value.trim();

    // If user edits after selecting, clear selection
    if (selectedContact && contactInput.value !== selectedContact.name) {
      selectedContact = null;
      document.getElementById('contact-id').value = '';
    }

    // Empty → browse all; otherwise debounce search
    if (!q) {
      searchTimeout = setTimeout(() => searchContacts(''), 100);
    } else {
      searchTimeout = setTimeout(() => searchContacts(q), 200);
    }
  });

  async function searchContacts(q) {
    try {
      const res = await fetch(`/api/contacts?q=${encodeURIComponent(q)}`);
      renderDropdown(await res.json());
    } catch (_) {
      dropdown.style.display = 'none';
    }
  }

  function renderDropdown(contacts) {
    if (contacts.length === 0) {
      dropdown.style.display = 'none';
      return;
    }
    dropdown.innerHTML = contacts.map((c) => `
      <div class="contact-item"
           data-id="${escapeHtml(c.id)}"
           data-name="${escapeHtml(c.name)}">
        <div class="contact-name">
          ${escapeHtml(c.name)}
          ${c.isGroup ? '<span class="group-tag">group</span>' : ''}
        </div>
        ${c.number ? `<div class="contact-number">${escapeHtml(c.number)}</div>` : ''}
      </div>
    `).join('');
    dropdown.style.display = 'block';
  }

  // Event delegation — dropdown items
  dropdown.addEventListener('click', (e) => {
    const item = e.target.closest('.contact-item');
    if (!item) return;
    selectedContact = { id: item.dataset.id, name: item.dataset.name };
    contactInput.value = selectedContact.name;
    document.getElementById('contact-id').value = selectedContact.id;
    document.getElementById('contact-name-hidden').value = selectedContact.name;
    dropdown.style.display = 'none';
  });

  // Close dropdown on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.contact-wrapper')) dropdown.style.display = 'none';
  });

  // ── Default date/time ─────────────────────────────────────────────────────
  function setDefaultDateTime() {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(9, 0, 0, 0);
    const pad = (n) => String(n).padStart(2, '0');
    document.getElementById('send-at').value =
      `${tomorrow.getFullYear()}-${pad(tomorrow.getMonth() + 1)}-${pad(tomorrow.getDate())}T09:00`;
  }

  // ── Schedule message ──────────────────────────────────────────────────────
  document.getElementById('schedule-btn').addEventListener('click', scheduleMessage);

  // ── File attachment ────────────────────────────────────────────────────────
  const fileInput     = document.getElementById('file-input');
  const attachBtn     = document.getElementById('attach-btn');
  const fileNameSpan  = document.getElementById('file-name');
  const clearFileBtn  = document.getElementById('clear-file-btn');
  const msgOptional   = document.getElementById('msg-optional');

  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileNameSpan.textContent = fileInput.files[0].name;
      clearFileBtn.style.display = 'inline';
      msgOptional.style.display = 'inline';
    }
  });

  clearFileBtn.addEventListener('click', () => {
    fileInput.value = '';
    fileNameSpan.textContent = '';
    clearFileBtn.style.display = 'none';
    msgOptional.style.display = 'none';
  });

  async function scheduleMessage() {
    const contactId   = document.getElementById('contact-id').value;
    const contactName = document.getElementById('contact-name-hidden').value;
    const message     = document.getElementById('message-input').value.trim();
    const sendAt      = document.getElementById('send-at').value;
    const file        = fileInput.files[0];

    if (!contactId)             return alert('Please select a contact from the dropdown');
    if (!message && !file)      return alert('Please enter a message or attach a file');
    if (!sendAt)                return alert('Please set a send time');
    if (new Date(sendAt).getTime() <= Date.now()) return alert('Send time must be in the future');

    const btn = document.getElementById('schedule-btn');
    btn.disabled = true;
    btn.textContent = 'Scheduling…';

    try {
      let res;
      if (file) {
        const fd = new FormData();
        fd.append('contactId', contactId);
        fd.append('contactName', contactName);
        fd.append('message', message);
        fd.append('sendAt', new Date(sendAt).getTime());
        fd.append('file', file);
        res = await fetch('/api/schedule', { method: 'POST', body: fd });
      } else {
        res = await fetch('/api/schedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contactId, contactName, message, sendAt: new Date(sendAt).getTime() }),
        });
      }

      if (!res.ok) {
        const err = await res.json();
        alert(err.error || 'Failed to schedule message');
        return;
      }

      // Reset form
      contactInput.value = '';
      document.getElementById('contact-id').value = '';
      document.getElementById('contact-name-hidden').value = '';
      document.getElementById('message-input').value = '';
      fileInput.value = '';
      fileNameSpan.textContent = '';
      clearFileBtn.style.display = 'none';
      msgOptional.style.display = 'none';
      selectedContact = null;
      setDefaultDateTime();
      await pollStatus();
    } catch (_) {
      alert('Failed to schedule message');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Schedule Message';
    }
  }

  // ── Download images ───────────────────────────────────────────────────────
  const downloadContactInput = document.getElementById('download-contact-input');
  const downloadDropdown     = document.getElementById('download-contact-dropdown');
  let downloadSearchTimeout  = null;
  let downloadSelectedContact = null;

  downloadContactInput.addEventListener('focus', () => {
    if (!downloadContactInput.value.trim()) searchDownloadContacts('');
  });

  downloadContactInput.addEventListener('input', () => {
    clearTimeout(downloadSearchTimeout);
    const q = downloadContactInput.value.trim();

    if (downloadSelectedContact && downloadContactInput.value !== downloadSelectedContact.name) {
      downloadSelectedContact = null;
      document.getElementById('download-contact-id').value = '';
    }

    downloadSearchTimeout = setTimeout(() => searchDownloadContacts(q), q ? 200 : 100);
  });

  async function searchDownloadContacts(q) {
    try {
      const res = await fetch(`/api/contacts?q=${encodeURIComponent(q)}`);
      renderDownloadDropdown(await res.json());
    } catch (_) {
      downloadDropdown.style.display = 'none';
    }
  }

  function renderDownloadDropdown(contacts) {
    if (contacts.length === 0) {
      downloadDropdown.style.display = 'none';
      return;
    }
    downloadDropdown.innerHTML = contacts.map((c) => `
      <div class="contact-item"
           data-id="${escapeHtml(c.id)}"
           data-name="${escapeHtml(c.name)}">
        <div class="contact-name">
          ${escapeHtml(c.name)}
          ${c.isGroup ? '<span class="group-tag">group</span>' : ''}
        </div>
        ${c.number ? `<div class="contact-number">${escapeHtml(c.number)}</div>` : ''}
      </div>
    `).join('');
    downloadDropdown.style.display = 'block';
  }

  downloadDropdown.addEventListener('click', (e) => {
    const item = e.target.closest('.contact-item');
    if (!item) return;
    downloadSelectedContact = { id: item.dataset.id, name: item.dataset.name };
    downloadContactInput.value = downloadSelectedContact.name;
    document.getElementById('download-contact-id').value = downloadSelectedContact.id;
    document.getElementById('download-contact-name-hidden').value = downloadSelectedContact.name;
    downloadDropdown.style.display = 'none';
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#download-card .contact-wrapper')) downloadDropdown.style.display = 'none';
  });

  document.getElementById('download-btn').addEventListener('click', downloadImages);

  async function downloadImages() {
    const contactId   = document.getElementById('download-contact-id').value;
    const contactName = document.getElementById('download-contact-name-hidden').value;
    const resultEl    = document.getElementById('download-result');

    if (!contactId) return alert('Please select a contact or group from the dropdown');

    const btn = document.getElementById('download-btn');
    btn.disabled = true;
    btn.textContent = 'Downloading…';
    resultEl.textContent = 'Scanning chat history — this can take a while for large chats…';

    try {
      const res = await fetch('/api/download-images', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contactId, contactName }),
      });
      const data = await res.json();

      if (!res.ok) {
        resultEl.textContent = '';
        alert(data.error || 'Failed to download images');
        return;
      }

      if (data.count === 0 && data.documentCount === 0) {
        resultEl.textContent = 'No images or documents found in this chat.';
      } else {
        const parts = [];
        if (data.count > 0) parts.push(`${data.count} image(s) to ${data.folder}`);
        if (data.documentCount > 0) parts.push(`${data.documentCount} document(s) to ${data.documentsFolder}`);
        resultEl.textContent = `Downloaded ${parts.join(' and ')}`;
      }
    } catch (_) {
      resultEl.textContent = '';
      alert('Failed to download images');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Download Images';
    }
  }

  // ── Cancel shutdown ───────────────────────────────────────────────────────
  document.getElementById('keep-running-btn').addEventListener('click', cancelShutdown);

  async function cancelShutdown() {
    try {
      await fetch('/api/cancel-shutdown', { method: 'POST' });
      shutdownAt = null;
      document.getElementById('shutdown-banner').classList.add('hidden');
      if (shutdownCountdownInterval) {
        clearInterval(shutdownCountdownInterval);
        shutdownCountdownInterval = null;
      }
    } catch (_) {
      alert('Failed to cancel shutdown');
    }
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  const tabBar = document.getElementById('tab-bar');

  tabBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn || btn.dataset.tab === activeTab) return;
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach((t) =>
      t.classList.toggle('active', t.dataset.tab === activeTab));
    applyTabVisibility();
    renderScheduled();
    if (activeTab === 'translate') {
      loadTranslateGroupList();
      startFeedPolling();
    } else {
      stopFeedPolling();
    }
  });

  function applyTabVisibility() {
    const connected = waStatus === 'connected';
    tabBar.classList.toggle('hidden', !connected);
    document.getElementById('compose-card').classList.toggle('hidden', !connected || activeTab !== 'scheduler');
    document.getElementById('download-card').classList.toggle('hidden', !connected || activeTab !== 'scheduler');
    if (activeTab !== 'scheduler') document.getElementById('list-card').classList.add('hidden');
    document.getElementById('translate-groups-card').classList.toggle('hidden', !connected || activeTab !== 'translate');
    document.getElementById('translate-feed-card').classList.toggle('hidden', !connected || activeTab !== 'translate' || !activeGroup);
  }

  // ── Translate: saved groups ───────────────────────────────────────────────
  async function loadTranslateGroupList() {
    try {
      const res = await fetch('/api/translate/groups');
      translateGroups = await res.json();
      renderGroupChips();
    } catch (_) { /* server may be restarting */ }
  }

  async function saveTranslateGroupsToServer() {
    try {
      await fetch('/api/translate/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groups: translateGroups }),
      });
    } catch (_) { alert('Failed to save group list'); }
  }

  function renderGroupChips() {
    const el = document.getElementById('group-chips');
    if (translateGroups.length === 0) {
      el.innerHTML = '<div class="empty-state" style="padding:12px;width:100%;">No groups yet — search above to add one.</div>';
      return;
    }
    el.innerHTML = translateGroups.map((g) => `
      <button class="group-chip ${activeGroup && activeGroup.id === g.id ? 'active' : ''}" data-group-id="${escapeHtml(g.id)}">
        ${escapeHtml(g.name)}
        <span class="chip-remove" data-remove-id="${escapeHtml(g.id)}" title="Remove">&times;</span>
      </button>
    `).join('');
  }

  document.getElementById('group-chips').addEventListener('click', (e) => {
    const removeEl = e.target.closest('[data-remove-id]');
    if (removeEl) {
      e.stopPropagation();
      const id = removeEl.dataset.removeId;
      translateGroups = translateGroups.filter((g) => g.id !== id);
      if (activeGroup && activeGroup.id === id) { activeGroup = null; feedMessages = []; }
      saveTranslateGroupsToServer();
      renderGroupChips();
      applyTabVisibility();
      return;
    }
    const chip = e.target.closest('[data-group-id]');
    if (!chip) return;
    const group = translateGroups.find((g) => g.id === chip.dataset.groupId);
    if (group) openGroupFeed(group);
  });

  // ── Translate: group search ───────────────────────────────────────────────
  const groupSearchInput = document.getElementById('group-search-input');
  const groupSearchDropdown = document.getElementById('group-search-dropdown');
  let groupSearchTimeout = null;

  groupSearchInput.addEventListener('focus', () => searchGroups(groupSearchInput.value.trim()));
  groupSearchInput.addEventListener('input', () => {
    clearTimeout(groupSearchTimeout);
    groupSearchTimeout = setTimeout(() => searchGroups(groupSearchInput.value.trim()), 200);
  });

  async function searchGroups(q) {
    try {
      const res = await fetch(`/api/contacts?q=${encodeURIComponent(q)}`);
      const groups = (await res.json()).filter((c) => c.isGroup);
      if (groups.length === 0) { groupSearchDropdown.style.display = 'none'; return; }
      groupSearchDropdown.innerHTML = groups.map((g) => `
        <div class="contact-item" data-id="${escapeHtml(g.id)}" data-name="${escapeHtml(g.name)}">
          <div class="contact-name">${escapeHtml(g.name)} <span class="group-tag">group</span></div>
        </div>
      `).join('');
      groupSearchDropdown.style.display = 'block';
    } catch (_) { groupSearchDropdown.style.display = 'none'; }
  }

  groupSearchDropdown.addEventListener('click', (e) => {
    const item = e.target.closest('.contact-item');
    if (!item) return;
    groupSearchDropdown.style.display = 'none';
    groupSearchInput.value = '';
    if (!translateGroups.some((g) => g.id === item.dataset.id)) {
      translateGroups.push({ id: item.dataset.id, name: item.dataset.name });
      saveTranslateGroupsToServer();
      renderGroupChips();
    }
    openGroupFeed(translateGroups.find((g) => g.id === item.dataset.id));
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#translate-groups-card .contact-wrapper')) groupSearchDropdown.style.display = 'none';
  });

  // ── Translate: feed ───────────────────────────────────────────────────────
  function openGroupFeed(group) {
    activeGroup = group;
    feedLimit = 50;
    feedMessages = [];
    document.getElementById('feed-title').textContent = group.name;
    renderGroupChips();
    applyTabVisibility();
    renderFeed(true);
    fetchFeed({ scrollToBottom: true });
  }

  async function fetchFeed({ scrollToBottom = false, keepScroll = false } = {}) {
    if (!activeGroup || feedFetchInFlight) return;
    feedFetchInFlight = true;
    const feedEl = document.getElementById('feed');
    const prevHeight = feedEl.scrollHeight;
    try {
      const res = await fetch(`/api/translate/messages?groupId=${encodeURIComponent(activeGroup.id)}&limit=${feedLimit}`);
      const data = await res.json();
      const errEl = document.getElementById('translate-error');
      if (!res.ok) {
        errEl.textContent = data.error || 'Failed to load messages';
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.toggle('hidden', !data.translationError);
      if (data.translationError) errEl.textContent = `Translation failed (will retry): ${data.translationError}`;
      feedMessages = data.messages;
      renderFeed();
      if (scrollToBottom) feedEl.scrollTop = feedEl.scrollHeight;
      if (keepScroll) feedEl.scrollTop = feedEl.scrollHeight - prevHeight; // keep viewport anchored after prepending history
    } catch (_) {
      // transient network error — next poll retries
    } finally {
      feedFetchInFlight = false;
      document.getElementById('feed-loading').classList.add('hidden');
    }
  }

  function mediaLabel(type) {
    const labels = { image: '📷 photo', video: '🎥 video', ptt: '🎤 voice message', audio: '🎵 audio', document: '📄 document', sticker: '💟 sticker', location: '📍 location', vcard: '👤 contact card' };
    return labels[type] || `[${type}]`;
  }

  function renderFeed(loadingOnly = false) {
    const feedEl = document.getElementById('feed');
    const loading = '<div id="feed-loading" class="hidden">Loading older messages…</div>';
    if (loadingOnly) { feedEl.innerHTML = loading + '<div class="empty-state">Loading…</div>'; return; }
    if (feedMessages.length === 0) {
      feedEl.innerHTML = loading + '<div class="empty-state">No messages yet in this group.</div>';
      return;
    }
    feedEl.innerHTML = loading + feedMessages.map((m) => {
      const hasText = m.body && m.body.trim();
      const isMedia = m.type !== 'chat';
      let content = '';
      if (isMedia) content += `<div class="bubble-media">${escapeHtml(mediaLabel(m.type))}</div>`;
      if (hasText) {
        if (m.translated && m.translation !== null) {
          content += `<div class="bubble-translation">${escapeHtml(m.translation)}</div>`;
          content += `<div class="bubble-original">${escapeHtml(m.body)}</div>`;
        } else if (m.translated) {
          // already English
          content += `<div class="bubble-translation">${escapeHtml(m.body)}<span class="lang-badge">EN</span></div>`;
        } else {
          content += `<div class="bubble-translation">${escapeHtml(m.body)}</div>`;
          content += `<div class="bubble-failed">translation pending — retrying…</div>`;
        }
      }
      return `
        <div class="bubble ${m.fromMe ? 'from-me' : ''}">
          <div class="bubble-sender">${escapeHtml(m.senderName)}</div>
          ${content}
          <div class="bubble-meta">${escapeHtml(formatDateTime(m.timestamp))}${m.lang && m.translation !== null ? `<span class="lang-badge">${escapeHtml(m.lang)}</span>` : ''}</div>
        </div>
      `;
    }).join('');
  }

  // Scroll-up → load more history (fetchMessages only supports "latest N", so grow the limit)
  document.getElementById('feed').addEventListener('scroll', (e) => {
    if (e.target.scrollTop === 0 && activeGroup && !feedFetchInFlight && feedMessages.length >= feedLimit) {
      feedLimit += 100;
      document.getElementById('feed-loading').classList.remove('hidden');
      fetchFeed({ keepScroll: true });
    }
  });

  function startFeedPolling() {
    if (feedPollInterval) return;
    feedPollInterval = setInterval(() => {
      if (activeTab === 'translate' && activeGroup && waStatus === 'connected') fetchFeed();
    }, 4000);
  }

  function stopFeedPolling() {
    if (feedPollInterval) { clearInterval(feedPollInterval); feedPollInterval = null; }
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  setDefaultDateTime();
  pollStatus();
  setInterval(pollStatus, 3000);
</script>
</body>
</html>
